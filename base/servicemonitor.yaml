apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  labels:
    k8s-app: llm-load-test-exporter
  name: llm-load-test-exporter
spec:
  endpoints:
    - interval: 120s
      port: web
      scheme: http
      path: /metrics
  selector:
    matchLabels:
      app: llm-load-test-exporter

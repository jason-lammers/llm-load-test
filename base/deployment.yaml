kind: Deployment
apiVersion: apps/v1
metadata:
  name: llm-load-test-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: llm-load-test-exporter
  template:
    metadata:
      labels:
        app: llm-load-test-exporter
    spec:
      containers:
        - name: exporter
          image: quay.io/rh-ee-istaplet/nerc-tools:llm-load-test-exporter
          imagePullPolicy: Always
          ports:
            - name: web
              containerPort: 8080
          volumeMounts:
            - name: shared-data
              mountPath: /shared_data
          env:
            - name: OUTPUT_DIR
              value: "/shared_data/output"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: web
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /readyz
              port: web
            initialDelaySeconds: 5
            periodSeconds: 10
        - name: runner
          image: quay.io/rh-ee-istaplet/nerc-tools:llm-load-test-runner
          imagePullPolicy: Always
          volumeMounts:
            - name: shared-data
              mountPath: /shared_data
          env:
            - name: OUTPUT_DIR
              value: "/shared_data/output"
            - name: WAIT_TIME
              value: "120"
            - name: CONCURRENCY
              value: "8"
            - name: DURATION
              value: "30"
            - name: STREAMING
              value: "true"
            - name: ENDPOINT
              value: "/v1/chat/completions"
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
      serviceAccountName: llm-load-test-sa
      volumes:
        - name: shared-data
          emptyDir: {}
